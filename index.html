<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BZ Travels - Taxi, Mini Bus & Tempo Traveller Booking</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial,Helvetica,sans-serif
    }

    body{
      background:#0b0b0b;
      color:#fff;
      line-height:1.5
    }

    header{
      background:#111;
      padding:18px 16px;
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid #222;
    }

    .nav{
      max-width:1100px;
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .brand{
      font-size:28px;
      font-weight:800;
    }

    .brand span{
      color:#ffb300;
    }

    .call-btn{
      background:#ffb300;
      color:#000;
      text-decoration:none;
      padding:10px 18px;
      border-radius:999px;
      font-weight:700;
    }

    .hero{
      padding:70px 16px;
      background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?q=80&w=1600&auto=format&fit=crop');
